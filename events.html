document.querySelector('#images').addEventListener('click', function(e) {

  if (e.shiftKey && e.target.tagName === 'IMG') {
    e.target.remove()
    console.log('Image removed with SHIFT')
  }

  else if (e.ctrlKey) {
    console.log('Ctrl + Click detected')
  }

  else {
    console.log('Normal click')
  }

})
